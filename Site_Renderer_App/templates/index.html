<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Renderer</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="/static/style.css" />

  <!-- Restore theme before paint -->
  <script>
    const saved = localStorage.getItem("theme");
    if (saved) document.documentElement.setAttribute("data-theme", saved);
  </script>
</head>
<body>
  <div id="app">
    <!-- Full-bleed map -->
    <div id="map"></div>

    <!-- Floating sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <div class="header-row">
          <h1>Site Renderer</h1>
          <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark / light mode">
            <span class="toggle-icon moon">&#9790;</span>
            <span class="toggle-icon sun">&#9728;</span>
          </button>
        </div>
        <div id="search-box">
          <input id="search-input" type="text" placeholder="Search city or address..." autocomplete="off" />
          <div id="search-results"></div>
        </div>
      </div>

      <!-- Segmented control -->
      <div id="tabs">
        <button class="tab active" data-tab="locations" onclick="switchTab('locations')">Locations</button>
        <button class="tab" data-tab="pipeline" onclick="switchTab('pipeline')">Pipeline</button>
      </div>

      <!-- Tab: Locations -->
      <div id="tab-locations" class="tab-content active">
        <div id="location-list"></div>
      </div>

      <!-- Tab: Pipeline -->
      <div id="tab-pipeline" class="tab-content">
        <div id="notebook-config">
          <div class="section-title">Notebooks</div>
          <div id="notebook-checkboxes"></div>
        </div>
        <div id="pipeline-viewer">
          <div class="section-title">Sites</div>
          <div id="pipeline-sites"></div>
        </div>
        <div id="pipeline-log-section">
          <div class="section-title">Log</div>
          <div id="pipeline-log"></div>
        </div>
      </div>

      <!-- Actions -->
      <div id="sidebar-actions">
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="saveLocations()">Save</button>
          <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
        </div>
        <div class="btn-row">
          <button id="btn-run-all" class="btn btn-run" onclick="runAll()">Run All Sites</button>
          <button id="btn-cancel" class="btn btn-cancel" onclick="cancelPipeline()" style="display:none;">Cancel</button>
        </div>
        <button id="btn-combine" class="btn btn-primary" onclick="combineCSVs()" disabled>
          Combine CSVs
        </button>
      </div>
    </div>

    <!-- Floating mini-map -->
    <div id="minimap-container">
      <div id="minimap"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
